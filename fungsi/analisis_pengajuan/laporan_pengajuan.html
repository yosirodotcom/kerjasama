// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let filteredData = [...RAW_DATA];
let currentPage = 1;
let pageSize = 50;
let sortKey = null;
let sortAsc = true;

// ──────────────────────────────────────────────
// DOM References
// ──────────────────────────────────────────────
const tbody = document.getElementById('table-body');
const searchInput = document.getElementById('search-input');
const filteredCountEl = document.getElementById('filtered-count');
const pageSizeSelect = document.getElementById('page-size');
const paginationControls = document.getElementById('pagination-controls');
const btnReset = document.getElementById('btn-reset');

// ──────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseDateStr(d) {
    if (!d) return 0;
    const parts = d.split('-');
    if (parts.length !== 3) return 0;
    return new Date(parts[2], parts[1]-1, parts[0]).getTime();
}

// ──────────────────────────────────────────────
// Rendering
// ──────────────────────────────────────────────
function renderTable() {
    const start = (currentPage - 1) * pageSize;
    const pageData = filteredData.slice(start, start + pageSize);

    tbody.innerHTML = pageData.map((row, idx) => {
        const globalIdx = start + idx + 1;
        const linkHtml = row.link_dokumen
            ? `<a href="${escapeHtml(row.link_dokumen)}" target="_blank" rel="noopener" class="link-pill">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                Buka
               </a>`
            : '<span class="text-slate-600 text-xs">—</span>';

        return `<tr class="border-b border-slate-800/60 animate-row" style="animation-delay:${idx * 15}ms">
            <td class="px-4 py-3 text-slate-500 text-xs font-mono">${globalIdx}</td>
            <td class="px-4 py-3 font-medium text-slate-100">${escapeHtml(row.nomor_dokumen)}</td>
            <td class="px-4 py-3 text-slate-300">${escapeHtml(row.tanggal_penetapan)}</td>
            <td class="px-4 py-3">${linkHtml}</td>
            <td class="px-4 py-3 text-slate-300">${escapeHtml(row.tanggal_pengajuan)}</td>
            <td class="px-4 py-3 text-slate-300 max-w-xs truncate" title="${escapeHtml(row.tentang)}">${escapeHtml(row.tentang)}</td>
            <td class="px-4 py-3 text-accent-400 font-medium">${escapeHtml(row.nama_mitra)}</td>
        </tr>`;
    }).join('');

    filteredCountEl.textContent = filteredData.length === RAW_DATA.length
        ? 'Menampilkan semua'
        : `Menampilkan ${filteredData.length} dari ${RAW_DATA.length}`;

    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    let html = '';

    const btnClass = (active) => active
        ? 'px-3 py-1.5 rounded-md text-xs font-semibold bg-accent-500 text-white'
        : 'px-3 py-1.5 rounded-md text-xs text-slate-400 hover:bg-surface-700 hover:text-slate-200 transition';

    // Prev
    html += `<button class="${btnClass(false)}" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹</button>`;

    // Pages (show max 7)
    let pages = [];
    if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
    } else {
        pages.push(1);
        if (currentPage > 3) pages.push('...');
        for (let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++) pages.push(i);
        if (currentPage < totalPages - 2) pages.push('...');
        pages.push(totalPages);
    }

    pages.forEach(p => {
        if (p === '...') {
            html += `<span class="px-2 text-xs text-slate-600">…</span>`;
        } else {
            html += `<button class="${btnClass(p===currentPage)}" onclick="goPage(${p})">${p}</button>`;
        }
    });

    html += `<button class="${btnClass(false)}" ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">›</button>`;

    paginationControls.innerHTML = html;
}

// ──────────────────────────────────────────────
// Sorting
// ──────────────────────────────────────────────
document.querySelectorAll('.sort-btn').forEach(th => {
    th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortAsc = !sortAsc;
        } else {
            sortKey = key;
            sortAsc = true;
        }

        // Update indicators
        document.querySelectorAll('.sort-indicator').forEach(s => s.textContent = '');
        th.querySelector('.sort-indicator').textContent = sortAsc ? ' ▲' : ' ▼';

        const isDate = key.startsWith('tanggal');
        filteredData.sort((a, b) => {
            let va = a[key] || '', vb = b[key] || '';
            if (isDate) { va = parseDateStr(va); vb = parseDateStr(vb); }
            else { va = va.toLowerCase(); vb = vb.toLowerCase(); }
            if (va < vb) return sortAsc ? -1 : 1;
            if (va > vb) return sortAsc ? 1 : -1;
            return 0;
        });

        currentPage = 1;
        renderTable();
    });
});

// ──────────────────────────────────────────────
// Search / Filter
// ──────────────────────────────────────────────
let debounceTimer;
searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        const q = searchInput.value.toLowerCase().trim();
        filteredData = q
            ? RAW_DATA.filter(r =>
                (r.nomor_dokumen||'').toLowerCase().includes(q) ||
                (r.tentang||'').toLowerCase().includes(q) ||
                (r.nama_mitra||'').toLowerCase().includes(q) ||
                (r.tanggal_penetapan||'').includes(q) ||
                (r.tanggal_pengajuan||'').includes(q)
              )
            : [...RAW_DATA];
        currentPage = 1;
        renderTable();
    }, 200);
});

btnReset.addEventListener('click', () => {
    searchInput.value = '';
    filteredData = [...RAW_DATA];
    sortKey = null;
    sortAsc = true;
    document.querySelectorAll('.sort-indicator').forEach(s => s.textContent = '');
    currentPage = 1;
    renderTable();
});

pageSizeSelect.addEventListener('change', () => {
    pageSize = parseInt(pageSizeSelect.value);
    currentPage = 1;
    renderTable();
});

function goPage(p) {
    const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderTable();
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
renderTable();
</script>
